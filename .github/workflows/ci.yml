name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python lint
        run: pip install flake8 &&
          flake8 gateway/
      - name: C++ compile check
        run: sudo apt-get update &&
          sudo apt-get install -y cmake g++ make ca-certificates &&
          cd server &&
          cmake -B build &&
          cmake --build build

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        run: docker compose build &&
          docker compose push
